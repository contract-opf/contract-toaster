# DTS deployment (Docker Compose) — generic, image-based variant for Coolify
# (or any host that pulls prebuilt images instead of building from source).
#
# Differences from docker-compose.yml (the build-from-source local variant):
#   - backend/bootstrap/frontend pull published GHCR images instead of `build:`.
#   - No host `ports:` publishing on backend/frontend: the reverse proxy routes
#     a domain to each service's internal container port (set in the Coolify UI).
#   - Every deployment-specific value is a bare ${VAR}, filled in by the host's
#     own UI. No domains, secrets, or host references live in this file.
#
# Service topology:
#   - frontend (nginx, container port 8080) serves the SPA AND reverse-proxies
#     /api, /version, /health, /openapi.json to backend:8080 over the internal
#     network. Assign the app domain to THIS service. backend needs no domain.
#   - minio (container port 9000) must be reachable directly from the browser:
#     downloads are presigned URLs the browser follows straight to MinIO. Assign
#     a SECOND domain to minio, and set S3_PUBLIC_ENDPOINT_URL to that domain so
#     the backend signs URLs the browser can actually reach.
#
# Required environment variables (set in the deploy host's UI, never in git):
#   DEMO_TOKEN_SECRET       - session-signing secret for demo password auth.
#   OPENROUTER_API_KEY      - real key. REQUIRED: MODEL_PROVIDER=openrouter (set
#                             below) runs the real review pipeline, which rejects
#                             an empty key, so an unset/wrong key makes every
#                             review fail (ERROR / MANUAL_REVIEW_REQUIRED) — it does
#                             NOT fall back to the mock. Reviews are billed per
#                             model-policy/openrouter.json.
#   S3_PUBLIC_ENDPOINT_URL  - public https URL of the minio service's domain,
#                             e.g. https://<your-minio-subdomain>.

x-aws-emulator-env: &aws-emulator-env
  AWS_REGION: us-east-1
  # MinIO/DDB-Local accept any non-empty credentials; these must match MinIO's
  # root user/password below.
  AWS_ACCESS_KEY_ID: local
  AWS_SECRET_ACCESS_KEY: localsecret
  S3_ENDPOINT_URL: http://minio:9000
  DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000

x-resource-names: &resource-names
  USERS_TABLE: contract-toaster-users-dts
  REVIEWS_TABLE: contract-toaster-reviews-dts
  REVIEW_SUBMISSIONS_TABLE: contract-toaster-review-submissions-dts
  DAILY_SPEND_TABLE: contract-toaster-daily-spend-dts
  AUDIT_TABLE: contract-toaster-audit-dts
  AUTH_SETTINGS_TABLE: contract-toaster-auth-settings-dts
  PLAYBOOKS_TABLE: contract-toaster-playbooks-dts
  PLAYBOOK_VERSIONS_TABLE: contract-toaster-playbook-versions-dts
  RETENTION_SETTINGS_TABLE: contract-toaster-retention-settings-dts
  SYNC_STATUS_TABLE: contract-toaster-sync-status-dts
  UPLOADS_BUCKET: contract-toaster-uploads-dts
  OUTPUTS_BUCKET: contract-toaster-outputs-dts

services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/data"]
    working_dir: /home/dynamodblocal
    volumes:
      - ddb-data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: localsecret
    volumes:
      - minio-data:/data

  bootstrap:
    image: ghcr.io/contract-opf/contract-toaster-dts-backend:latest
    command: ["python3", "/app/deploy/dts/bootstrap.py"]
    working_dir: /app
    environment:
      <<: [*aws-emulator-env, *resource-names]
    depends_on:
      dynamodb-local:
        condition: service_started
      minio:
        condition: service_started
    restart: "no"

  backend:
    image: ghcr.io/contract-opf/contract-toaster-dts-backend:latest
    environment:
      <<: [*aws-emulator-env, *resource-names]
      DEPLOY_TARGET: dts
      MODEL_PROVIDER: openrouter
      AUTH_MODE: password
      PIPELINE_RUNNER: inprocess
      STATE_MACHINE_ARN: "inprocess:contract-toaster-dts"
      # Downloads are presigned for a browser-reachable host, not the internal
      # `minio` DNS name. Set this to the minio service's public domain.
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL}
      DEMO_TOKEN_SECRET: ${DEMO_TOKEN_SECRET:?set DEMO_TOKEN_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY — required because MODEL_PROVIDER=openrouter runs real reviews}
    depends_on:
      bootstrap:
        condition: service_completed_successfully

  frontend:
    image: ghcr.io/contract-opf/contract-toaster-dts-frontend:latest
    depends_on:
      - backend

volumes:
  ddb-data:
  minio-data:
