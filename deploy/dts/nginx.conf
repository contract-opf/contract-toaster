# Serve the SPA and reverse-proxy the API to the backend so the browser talks
# to a single origin (no CORS config needed on the backend).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API + auth + health/version -> backend. Keep this list in sync with the
    # backend's route prefixes (src/main.py, src/review_routes.py).
    location /api/    { proxy_pass http://backend:8080; proxy_set_header Host $host; }
    location /version { proxy_pass http://backend:8080; proxy_set_header Host $host; }
    location /health  { proxy_pass http://backend:8080; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://backend:8080; proxy_set_header Host $host; }

    # SPA fallback: any other path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
