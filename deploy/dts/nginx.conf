# Serve the SPA and reverse-proxy the API to the backend so the browser talks
# to a single origin (no CORS config needed on the backend).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Contract uploads must survive the proxy. nginx defaults
    # client_max_body_size to 1m, which silently breaks this product: the
    # backend deliberately accepts up to 25 MiB
    # (upload_validation.MAX_UPLOAD_SIZE_BYTES) and, past that, returns a
    # designed 413 with a `file_too_large` reason code that the SPA renders as
    # friendly copy. At the default, nginx would instead reject any agreement
    # over 1 MB itself -- which real .docx contracts with images/logos clear
    # easily -- with a bare HTML error page the SPA can't parse, never reaching
    # the backend's validation at all.
    #
    # Set deliberately ABOVE the app cap: the backend stays the single
    # authority on the upload limit (so the user gets the structured error),
    # while nginx remains a coarse backstop against absurd bodies. The headroom
    # covers multipart/form-data overhead on a file right at the 25 MiB line.
    client_max_body_size 32m;

    # API + auth + health/version -> backend. Keep this list in sync with the
    # backend's route prefixes (src/main.py, src/review_routes.py).
    location /api/    { proxy_pass http://backend:8080; proxy_set_header Host $host; }
    location /version { proxy_pass http://backend:8080; proxy_set_header Host $host; }
    location /health  { proxy_pass http://backend:8080; proxy_set_header Host $host; }
    location /openapi.json { proxy_pass http://backend:8080; proxy_set_header Host $host; }

    # SPA fallback: any other path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
