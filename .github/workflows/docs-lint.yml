# Docs-lint CI — stale-term sweep, latency consistency, rule count, field-dict check,
#                RUNBOOK prod-operability checks, phase-0 AC coverage check,
#                OOXML hygiene both directions check,
#                no-active-bundle state and deactivate action check,
#                clean-copy export / de-marking procedure check
#
# Runs on every PR that touches docs/, ARCHITECTURE.md, RUNBOOK.md, or
# aws-access-request.md so the stale-term sweep and RUNBOOK operability checks
# can never silently not-happen again.  Also runs on push to main so
# a direct commit cannot skip the gate.
#
# Ten checks (see scripts/docs-lint.py, tests/test_phase0_ac_coverage.py,
#              tests/test_ooxml_hygiene_both_directions.py,
#              tests/test_no_active_bundle.py, and
#              tests/test_clean_copy_export_runbook.py):
#   A – Stale-term denylist (Opus 4.7, contract-toaster@ address, global. profile prefix)
#   B – Latency-figure consistency (one canonical figure across all living docs)
#   C – Rule-count assertion (playbook hard_rejections == evaluation planted cases)
#   D – Field-dictionary subset + terminal-states check (reviews table in ARCHITECTURE.md)
#   E – No literal AWS account ID in RUNBOOK command bodies (issue #44)
#   F – No placeholder phrases in authoritative ops docs (issue #44)
#   G – Phase-0 AC coverage (every governance CI rule in playbook-governance.md has an
#       issue home in docs/phase-0-issues.md; anchor-map builder accounted for)
#   H – OOXML hygiene both directions (input part allowlist + output rescan + admin-XSS
#       sinks enumerated: doc properties and filenames alongside section titles)
#   I – No-active-bundle state + deactivate action (issue #41):
#       · POST /api/reviews refuses with HTTP 503 + "no active playbook" message
#       · Deactivate action defined, audited, GC-gated, distinct from rollback
#       · RUNBOOK suspend-intake procedure documented
#       · docs/playbook-governance.md lifecycle updated
#   J – Clean-copy export / de-marking procedure (issue #39):
#       · RUNBOOK.md contains a named de-marking procedure with cover-page +
#         header/footer guidance, approval gate, and audit-recording instruction
#       · docs/output-contract.md states marker is default; clean copy is the
#         deliberate approval exit; cross-references RUNBOOK for the procedure
#       · docs/threat-model.md external-communication section reflects the
#         controlled approval exit path
#
# Adding a new stale term: edit the DENYLIST in scripts/docs-lint.py and note
# the term, reason, and date in a comment.  Review and update at each release.
#
# Adding a new governance CI rule to playbook-governance.md: also add a sentinel
# to the REQUIRED_SENTINELS list in tests/test_phase0_ac_coverage.py and update
# the relevant Phase 0 issue's AC in docs/phase-0-issues.md.

name: docs-lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'ARCHITECTURE.md'
      - 'RUNBOOK.md'
      - 'aws-access-request.md'
      - 'playbooks/**'
      - 'scripts/docs-lint.py'
      - 'tests/test_phase0_ac_coverage.py'
      - 'tests/test_ooxml_hygiene_both_directions.py'
      - 'tests/test_no_active_bundle.py'
      - 'tests/test_clean_copy_export_runbook.py'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'ARCHITECTURE.md'
      - 'RUNBOOK.md'
      - 'aws-access-request.md'
      - 'playbooks/**'
      - 'scripts/docs-lint.py'
      - 'tests/test_phase0_ac_coverage.py'
      - 'tests/test_ooxml_hygiene_both_directions.py'
      - 'tests/test_no_active_bundle.py'
      - 'tests/test_clean_copy_export_runbook.py'

jobs:
  docs-lint:
    name: Docs lint (stale terms / latency / rule count / field dict)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run docs-lint
        run: python3 scripts/docs-lint.py

  phase0-ac-coverage:
    name: Phase-0 AC coverage (governance CI rules have issue homes)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check phase-0 AC coverage
        run: python3 tests/test_phase0_ac_coverage.py
        # Asserts that every governance CI rule enumerated in
        # docs/playbook-governance.md has an AC home in some Phase 0 issue in
        # docs/phase-0-issues.md, and that the anchor-map builder deliverable
        # is accounted for. Fails if a new rule is added to playbook-governance.md
        # without a corresponding issue AC update.
        # See: https://github.com/contract-opf/contract-toaster/issues/46

  ooxml-hygiene-both-directions:
    name: OOXML hygiene both directions (input allowlist + output rescan + admin-XSS sinks)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check OOXML hygiene both directions
        run: python3 tests/test_ooxml_hygiene_both_directions.py
        # Three axes (see issue #25):
        #   A – Input OOXML part allowlist: only body + tables reach extraction;
        #       doc properties, headers/footers, textboxes, alt text, SmartArt,
        #       content controls are excluded; filename never in prompts.
        #   B – Output-side: model text inserted as literal runs only; generated
        #       .docx subjected to the same hostile-file scan as uploaded inputs.
        #   C – Admin-XSS sinks: document properties and upload filenames enumerated
        #       alongside section titles in the Admin UI stored-XSS section.
        # See: https://github.com/contract-opf/contract-toaster/issues/25

  no-active-bundle:
    name: No-active-bundle state + deactivate action (issue #41)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check no-active-bundle state and deactivate action
        run: python3 tests/test_no_active_bundle.py
        # Four gates (see issue #41):
        #   Gate 1 – POST /api/reviews refuses with HTTP 503 + "no active playbook"
        #            when no release bundle is active; user-visible message specified.
        #   Gate 2 – Deactivate action defined in ARCHITECTURE.md: distinct from
        #            rollback, audited, GC-gated consistently with activation controls.
        #   Gate 3 – RUNBOOK.md suspend-intake procedure documented, references
        #            deactivate action, documents how to re-enable intake.
        #   Gate 4 – docs/playbook-governance.md release-bundle lifecycle updated
        #            to include the no-active-bundle state and deactivate action.
        # See: https://github.com/contract-opf/contract-toaster/issues/41

  clean-copy-export-runbook:
    name: Clean-copy export / de-marking procedure (issue #39)
    runs-on: ${{ vars.CI_RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check clean-copy export and de-marking procedure
        run: python3 tests/test_clean_copy_export_runbook.py
        # Three gates (see issue #39):
        #   Gate 1 – RUNBOOK.md contains a named de-marking procedure with:
        #            · guidance to remove both cover page and header/footer marker
        #            · requirement that attorney approval precedes de-marking
        #            · instruction to record/audit the de-marking action
        #   Gate 2 – docs/output-contract.md states that:
        #            · the marker is the default on every generated redline
        #            · the clean copy is the deliberate approval exit (not the default)
        #            · cross-references RUNBOOK.md for the procedure
        #   Gate 3 – docs/threat-model.md external-communication guardrail reflects
        #            the controlled approval exit path (clean copy after approval is
        #            deliberate; distinct from accidental/unauthorized removal)
        # See: https://github.com/contract-opf/contract-toaster/issues/39
